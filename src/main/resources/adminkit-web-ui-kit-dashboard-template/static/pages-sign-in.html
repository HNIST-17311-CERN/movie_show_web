<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Responsive Admin & Dashboard Template based on Bootstrap 5">
    <meta name="author" content="AdminKit">
    <meta name="keywords" content="adminkit, bootstrap, bootstrap 5, admin, dashboard, template, responsive, css, sass, html, theme, front-end, ui kit, web">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="shortcut icon" href="img/icons/icon-48x48.png" />

    <link rel="canonical" href="https://demo-basic.adminkit.io/pages-sign-in.html" />

    <title>Sign In | AdminKit Demo</title>

    <link href="css/app.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
<main class="d-flex w-100">
    <div class="container d-flex flex-column">
        <div class="row vh-100">
            <div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
                <div class="d-table-cell align-middle">

                    <div class="text-center mt-4">
                        <h1 class="h2">欢迎光临小站</h1>
                        <p class="lead">
                            请登录你的账号以继续
                        </p>
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <div class="m-sm-4">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label">用户名</label>
                                        <input id="username" class="form-control form-control-lg" type="text" placeholder="Enter your username" />
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">密码</label>
                                        <input id="password" class="form-control form-control-lg" type="password" placeholder="Enter your password" />
                                        <small>
                                            <a href="index.html">忘记密码?</a>
                                        </small>
                                    </div>
                                    <div>
                                        <label class="form-check">
                                            <input class="form-check-input" type="checkbox" value="remember-me" name="remember-me" checked>
                                            <span class="form-check-label">
                                                    记住我下一次
                                                </span>
                                        </label>
                                    </div>
                                    <div class="text-center mt-3">
                                        <button type="submit" class="btn btn-lg btn-primary">登录</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/app.js"></script>
<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault(); // 阻止默认表单提交

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        fetch("http://localhost:8080/api/user/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        })
            .then(response => response.json())
            .then(data => {
                console.log("返回数据:", data);
                if (data.code === 200) {
                    //alert("登录成功");

                    // 保存 token
                    localStorage.setItem("token", data.data.token);

                    // 跳转首页
                    window.location.href = "../../filmlane-master/index.html";
                } else {
                    alert("登录失败：" + data.msg);
                }
            })
            .catch(error => {
                console.error("错误:", error);
                alert("请求失败，请检查后端是否启动或跨域配置");
            });
    });
</script>
</body>

</html>
