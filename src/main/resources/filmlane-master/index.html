<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观影 GYING - 海量电影与剧集</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    #home-movies-list {
      margin: 0;
      padding: 0;
      list-style: none;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      align-items: start;
    }

    #home-movies-list .movie-card,
    #home-movies-list .movie-card-wrapper {
      width: 100%;
      min-width: 0;
    }

    #home-movies-list .card-banner {
      width: 100%;
      height: 320px;
      overflow: hidden;
    }

    #home-movies-list .card-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #hero-sidebar .hero-side-card.active {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,123,255,0.15);
    }

    .hero-banner {
      align-items: stretch;
    }

    #hero-featured-link {
      height: 100%;
      min-height: 100%;
    }

    #hero-sidebar {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #hero-sidebar .hero-side-card {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body id="top">

  <header class="header">
    <div class="header-inner">
      <a href="./index.html" class="logo"><span class="logo-cn">观影</span> <span class="logo-en">GYING</span></a>
      <nav class="nav-links">
        <a href="./index.html" class="active">首页</a>
        <a href="./All_movie.html">电影</a>
        <a href="./TV_series.html">剧集</a>
        <a href="./Net_movie.html">动漫</a>
        <a href="#">热门</a>
        <a href="#">解析</a>
        <a href="./Setting.html">设置</a>
      </nav>
      <div class="search-box">
        <input type="text" placeholder="搜索影片">
      </div>
      <div class="header-actions">
        <a href="#">收藏</a>
        <a href="#">观看历史</a>
        <div class="user-avatar">用</div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="hero-banner">
        <a href="./movie-details.html" class="hero-featured" id="hero-featured-link">
          <img id="hero-featured-img" src="./assets/images/movie-1.png" alt="featured movie">
          <div class="hero-featured-overlay">
            <h2 class="hero-featured-title" id="hero-featured-title">推荐影片</h2>
            <p class="hero-featured-subtitle" id="hero-featured-subtitle">Featured movie</p>
            <p class="hero-featured-desc" id="hero-featured-desc">把鼠标移到右侧卡片上可切换推荐内容。</p>
          </div>
        </a>
        <div class="hero-sidebar" id="hero-sidebar"></div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">最近更新的电影</h2>
          <a href="./All_movie.html" class="section-more">更多 &gt;</a>
        </div>
        <div id="home-loading" class="loading-state">加载中...</div>
        <div id="home-error" class="error-state" style="display:none;">加载失败，请检查网络或 token 是否有效</div>
        <ul class="movies-list home-movies" id="home-movies-list"></ul>
      </section>
    </div>
  </main>

  <div class="float-widgets">
    <button class="float-widget pink" title="反馈">聊</button>
    <button class="float-widget gray" title="帮助">?</button>
  </div>

  <a href="#top" class="go-top" data-go-top>↑</a>

  <script src="./assets/js/script.js"></script>
  <script>
    (function() {
      var API_URL = 'http://localhost:8080/Mapper/findlast12';
      var LOGIN_URL = '../adminkit-web-ui-kit-dashboard-template/static/pages-sign-in.html';
      var DEFAULT_COVER_URL = './assets/images/movie-1.png';

      function getCoverUrl(cover) {
        if (!cover) return DEFAULT_COVER_URL;
        if (/^https?:\/\//i.test(cover)) return cover;

        var normalized = String(cover).replace(/\\/g, '/');
        if (normalized.indexOf('assets/images/') !== -1) return './' + normalized.substring(normalized.indexOf('assets/images/'));
        if (normalized.indexOf('resource/cover/') !== -1) return './' + normalized.substring(normalized.indexOf('resource/cover/'));
        if (normalized.startsWith('/')) return '.' + normalized;
        return normalized;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderEmpty(message) {
        document.getElementById('home-movies-list').innerHTML = '<li class="empty-state">' + message + '</li>';
      }

      function shuffleMovies(list) {
        var movies = list.slice();
        for (var i = movies.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = movies[i];
          movies[i] = movies[j];
          movies[j] = temp;
        }
        return movies;
      }

      function getHeroMeta(movie) {
        return [
          movie.releaseDate ? String(movie.releaseDate).substring(0, 4) : '',
          movie.region || '',
          movie.type || ''
        ].filter(Boolean).join(' / ');
      }

      function getHeroDesc(movie) {
        return movie.description || (movie.duration ? movie.duration + 'min' : '') || '暂无简介';
      }

      function updateHeroFeatured(movie) {
        var featuredLink = document.getElementById('hero-featured-link');
        var featuredImg = document.getElementById('hero-featured-img');
        var featuredTitle = document.getElementById('hero-featured-title');
        var featuredSubtitle = document.getElementById('hero-featured-subtitle');
        var featuredDesc = document.getElementById('hero-featured-desc');

        if (featuredLink) featuredLink.href = './movie-details.html?id=' + encodeURIComponent(movie.id || '');
        if (featuredImg) {
          featuredImg.src = getCoverUrl(movie.cover);
          featuredImg.alt = movie.name || 'featured movie';
          featuredImg.onerror = function() {
            this.onerror = null;
            this.src = DEFAULT_COVER_URL;
          };
        }
        if (featuredTitle) featuredTitle.textContent = movie.name || 'Unknown';
        if (featuredSubtitle) featuredSubtitle.textContent = getHeroMeta(movie) || 'Featured movie';
        if (featuredDesc) featuredDesc.textContent = getHeroDesc(movie);
      }

      function renderHero(movies) {
        var heroSidebar = document.getElementById('hero-sidebar');
        if (!heroSidebar || !movies.length) return;

        var picks = shuffleMovies(movies).slice(0, Math.min(3, movies.length));
        heroSidebar.innerHTML = '';
        updateHeroFeatured(picks[0]);

        picks.forEach(function(movie, index) {
          var link = document.createElement('a');
          link.href = './movie-details.html?id=' + encodeURIComponent(movie.id || '');
          link.className = 'hero-side-card' + (index === 0 ? ' active' : '');
          link.innerHTML =
            '<img src="' + escapeHtml(getCoverUrl(movie.cover)) + '" alt="' + escapeHtml(movie.name || 'movie') + '">' +
            '<div class="hero-side-card-info">' +
              '<h3 class="hero-side-card-title">' + escapeHtml(movie.name || 'Unknown') + '</h3>' +
              '<p class="hero-side-card-subtitle">' + escapeHtml(movie.releaseDate ? String(movie.releaseDate).substring(0, 4) : '最新推荐') + '</p>' +
              '<p class="hero-side-card-meta">' + escapeHtml(getHeroMeta(movie) || '--') + '</p>' +
            '</div>';

          var img = link.querySelector('img');
          if (img) {
            img.onerror = function() {
              this.onerror = null;
              this.src = DEFAULT_COVER_URL;
            };
          }

          link.addEventListener('mouseenter', function() {
            heroSidebar.querySelectorAll('.hero-side-card').forEach(function(card) {
              card.classList.remove('active');
            });
            link.classList.add('active');
            updateHeroFeatured(movie);
          });

          heroSidebar.appendChild(link);
        });
      }

      function renderMovie(movie) {
        var meta = [
          movie.releaseDate ? String(movie.releaseDate).substring(0, 4) : '',
          movie.region || '',
          movie.type || ''
        ].filter(Boolean).join(' / ');

        var li = document.createElement('li');
        li.className = 'movie-card-wrapper';
        li.innerHTML =
          '<div class="movie-card">' +
            '<a href="./movie-details.html?id=' + encodeURIComponent(movie.id || '') + '">' +
              '<figure class="card-banner">' +
                '<img src="' + escapeHtml(getCoverUrl(movie.cover)) + '" alt="' + escapeHtml(movie.name || 'movie') + '">' +
                '<span class="card-badge">HD</span>' +
                '<div class="card-overlay">' +
                  '<span class="star-count">' + escapeHtml(movie.duration ? movie.duration + 'min' : '--') + '</span>' +
                  '<span class="rating">--</span>' +
                '</div>' +
              '</figure>' +
            '</a>' +
            '<h3 class="card-title">' + escapeHtml(movie.name || 'Unknown') + '</h3>' +
            '<p class="card-meta">' + escapeHtml(meta || '--') + '</p>' +
          '</div>';

        var img = li.querySelector('img');
        if (img) {
          img.onerror = function() {
            this.onerror = null;
            this.src = DEFAULT_COVER_URL;
          };
        }

        document.getElementById('home-movies-list').appendChild(li);

        fetch('http://localhost:8080/FILMES/SCORE/ONE?id=' + encodeURIComponent(movie.id || ''), {
          headers: { token: localStorage.getItem('token') || '' }
        })
          .then(function(res) { return res.json(); })
          .then(function(scores) {
            var douban = Array.isArray(scores) ? scores.find(function(s) { return s.source === 'douban'; }) : null;
            if (douban) {
              var ratingEl = li.querySelector('.rating');
              if (ratingEl) ratingEl.textContent = '★ ' + douban.score.toFixed(1);
            }
          })
          .catch(function() {});
      }

      function loadLastMovies() {
        var token = localStorage.getItem('token');
        var loadingEl = document.getElementById('home-loading');
        var errorEl = document.getElementById('home-error');
        var listEl = document.getElementById('home-movies-list');

        if (!token) {
          loadingEl.style.display = 'none';
          renderEmpty('请先 <a href="' + LOGIN_URL + '">登录</a> 后访问');
          return;
        }

        fetch(API_URL, {
          headers: {
            token: token,
            'Content-Type': 'application/json'
          }
        })
          .then(function(res) {
            if (res.status === 401) {
              localStorage.removeItem('token');
              throw new Error('Unauthorized');
            }
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function(data) {
            var movies = Array.isArray(data) ? data : (data && Array.isArray(data.data) ? data.data : []);
            loadingEl.style.display = 'none';
            errorEl.style.display = 'none';
            listEl.innerHTML = '';

            if (!movies.length) {
              renderEmpty('暂无最新电影');
              return;
            }

            renderHero(movies);
            movies.forEach(renderMovie);
          })
          .catch(function(err) {
            loadingEl.style.display = 'none';
            if (err.message === 'Unauthorized') {
              renderEmpty('token 已过期，请重新 <a href="' + LOGIN_URL + '">登录</a>');
              return;
            }
            errorEl.style.display = 'block';
          });
      }

      loadLastMovies();
    })();
  </script>
</body>
</html>
