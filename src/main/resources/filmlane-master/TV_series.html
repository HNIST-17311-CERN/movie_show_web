<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧集 - 观影 GYING</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body id="top">

  <header class="header">
    <div class="header-inner">
      <a href="./index.html" class="logo"><span class="logo-cn">观影</span> <span class="logo-en">GYING</span></a>
      <nav class="nav-links">
        <a href="./index.html">首页</a>
        <a href="./All_movie.html">电影</a>
        <a href="./TV_series.html" class="active">剧集</a>
        <a href="./Net_movie.html">动漫</a>
        <a href="#">热门</a>
        <a href="#">解析</a>
        <a href="./Setting.html">设置</a>
      </nav>
      <div class="search-box">
        <input type="text" placeholder="搜索影片">
      </div>
      <div class="header-actions">
        <a href="#">收藏</a>
        <a href="#">观看历史</a>
        <div class="user-avatar">用</div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="filter-section">
        <div class="filter-row">
          <span class="filter-label">类型</span>
          <div class="filter-pills">
            <button class="filter-pill">全部</button>
            <button class="filter-pill active">电视剧</button>
            <button class="filter-pill">综艺</button>
            <button class="filter-pill">纪录片</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-label">年代</span>
          <div class="filter-pills">
            <button class="filter-pill active">全部</button>
            <button class="filter-pill">2024</button>
            <button class="filter-pill">2023</button>
            <button class="filter-pill">2022</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-label">地区</span>
          <div class="filter-pills">
            <button class="filter-pill active">全部</button>
            <button class="filter-pill">大陆</button>
            <button class="filter-pill">美国</button>
            <button class="filter-pill">韩国</button>
          </div>
        </div>
        <div class="filter-toolbar">
          <select><option>按添加时间</option></select>
          <label class="filter-checkbox"><input type="checkbox"> 可播放</label>
        </div>
      </div>

      <ul class="movies-list">
        <li>
          <div class="movie-card">
            <a href="./movie-details.html">
              <figure class="card-banner">
                <img src="./assets/images/series-1.png" alt="Moon Knight">
                <span class="card-badge">2K</span>
                <div class="card-overlay">
                  <span class="star-count">★ 289</span>
                  <span class="rating">8.6</span>
                </div>
              </figure>
            </a>
            <h3 class="card-title">Moon Knight</h3>
            <p class="card-meta">2022 / 美国 / 动作 / 奇幻</p>
          </div>
        </li>
        <li>
          <div class="movie-card">
            <a href="./movie-details.html">
              <figure class="card-banner">
                <img src="./assets/images/series-2.png" alt="Halo">
                <span class="card-badge">2K</span>
                <div class="card-overlay">
                  <span class="star-count">★ 412</span>
                  <span class="rating">8.8</span>
                </div>
              </figure>
            </a>
            <h3 class="card-title">Halo</h3>
            <p class="card-meta">2022 / 美国 / 科幻 / 动作</p>
          </div>
        </li>
        <li>
          <div class="movie-card">
            <a href="./movie-details.html">
              <figure class="card-banner">
                <img src="./assets/images/series-3.png" alt="Vikings: Valhalla">
                <span class="card-badge">2K</span>
                <div class="card-overlay">
                  <span class="star-count">★ 198</span>
                  <span class="rating">8.3</span>
                </div>
              </figure>
            </a>
            <h3 class="card-title">Vikings: Valhalla</h3>
            <p class="card-meta">2022 / 美国 / 动作 / 历史</p>
          </div>
        </li>
        <li>
          <div class="movie-card">
            <a href="./movie-details.html">
              <figure class="card-banner">
                <img src="./assets/images/series-4.png" alt="Money Heist">
                <span class="card-badge">4K</span>
                <div class="card-overlay">
                  <span class="star-count">★ 523</span>
                  <span class="rating">8.3</span>
                </div>
              </figure>
            </a>
            <h3 class="card-title">Money Heist</h3>
            <p class="card-meta">2017 / 西班牙 / 犯罪 / 剧情</p>
          </div>
        </li>
      </ul>
    </div>
  </main>

  <a href="#top" class="go-top" data-go-top>↑</a>
  <script src="./assets/js/script.js"></script>
</body>
</html>
